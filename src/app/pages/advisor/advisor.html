<div class="max-w-3xl mx-auto p-4 sm:p-6">
  <!-- Header Section -->
  <div class="text-center mb-8 space-y-2">
    <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-600 to-indigo-600 bg-clip-text text-transparent">
      NexaAdvisor
    </h1>
    <p class="text-gray-500 text-sm sm:text-base max-w-md mx-auto">
      Dapatkan saran investasi yang cerdas dan personal berdasarkan pola transaksi Anda. NexaAdvisor menggunakan AI untuk menganalisis data keuangan Anda dan memberikan rekomendasi yang relevan.
    </p>
  </div>

  <!-- Info Card
  <div class="bg-blue-50 border border-blue-100 rounded-xl p-4 mb-6 flex items-start">
    <svg class="w-5 h-5 text-blue-600 mt-0.5 mr-2 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
      <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2h-1V9z" clip-rule="evenodd"></path>
    </svg>
    <p class="text-blue-800 text-sm">
      Saran ini dihasilkan berdasarkan analisis pola transaksi Anda. Untuk hasil optimal, pastikan riwayat transaksi selalu diperbarui.
    </p>
  </div> -->

  <!-- CTA Button -->
  <div class="flex justify-center mb-8">
    <button
      (click)="fetchAdvice()"
      class="relative overflow-hidden group bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white px-8 py-3.5 rounded-lg shadow-lg hover:shadow-xl transition-all duration-300 disabled:opacity-80 disabled:cursor-not-allowed"
      [disabled]="loading"
    >
      <span class="relative z-10 flex items-center justify-center">
        @if (loading) {
          <svg class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
        }
        {{ loading ? "Menganalisis Transaksi..." : "Dapatkan Saran Sekarang" }}
      </span>
      <span class="absolute inset-0 bg-gradient-to-r from-blue-700 to-indigo-700 opacity-0 group-hover:opacity-100 transition-opacity duration-300"></span>
    </button>
  </div>

  <!-- Results Section -->
  @if (advice) {
    <div class="space-y-4">
      <div class="flex items-center justify-between">
        <h2 class="text-lg font-semibold text-gray-700">Hasil Analisis</h2>
        <div class="text-xs px-2 py-1 bg-blue-100 text-blue-800 rounded-full">
          Realtime AI
        </div>
      </div>

      <div class="advice-container transform transition-all duration-300 hover:shadow-md">
        <div
          class="markdown-content"
          [innerHTML]="advice"
          [class.typewriter-cursor]="typingIndex < fullAdvice.length"
        ></div>
      </div>

      <div class="flex justify-between items-center pt-2">
        <small class="text-xs text-gray-400 flex items-center">
          <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
          </svg>
          Powered by Gemini AI
        </small>
        <button
          class="text-xs text-blue-600 hover:text-blue-800 flex items-center"
          (click)="fetchAdvice()"
        >
          <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
          </svg>
          Analisis Ulang
        </button>
      </div>
    </div>
  }
</div>
